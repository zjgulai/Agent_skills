kind: skill
name: skill-creator
version: 0.1.0
description: Create new skills, modify and improve existing skills, and measure skill performance. Use when users want to create a skill from scratch, edit existing ones, run evals to test a skill, or optimize a skill description for trigger accuracy.
domain: meta
priority: P0

compatibility:
  opencode: native
  codex: adapter
  cursor: adapter
  kimi: adapter

source:
  type: external
  path: ~/.config/opencode/skills/skill-creator

triggers:
  - skill creation
  - skill creator
  - run evals
  - optimize description
  - new skill
  - mutation analysis

requires: {}

links:
  managed_in: ~/.config/opencode/skills/INDEX.md
