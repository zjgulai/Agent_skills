name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'data-mirror/**'
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install jinja2 beautifulsoup4 lxml pyyaml

      - name: Generate skills.json from data-mirror/INDEX.md
        run: python docs/_src/data-collect.py

      - name: Build docs/<lang>/*.html from originals
        run: python docs/_src/build.py

      - name: Mirror skills-graph.png into docs/assets
        run: |
          mkdir -p docs/assets
          cp data-mirror/skills-graph.png docs/assets/skills-graph.png

      - name: Show build summary
        run: |
          echo "::group::docs/data/portal-status.json"
          cat docs/data/portal-status.json
          echo "::endgroup::"
          echo "::group::docs tree (depth 2)"
          find docs -maxdepth 2 -type f | sort
          echo "::endgroup::"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
